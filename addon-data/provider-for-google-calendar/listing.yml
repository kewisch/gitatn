name: Provider for Google Calendar
summary: Provider for Google Calendar connects Thunderbird with Google Calendar for full task sync, conference details, and scheduling support. It offers deeper integration than Thunderbird’s native support using Google’s official API.
description: |
  This extension provides a deeper integration of Google Calendar into Thunderbird. In addition to events, this add-on will show Google Tasks right within Thunderbird. There are some practical features such as joining the video conferences quicker, and showing more information in the event dialog.
  
  Please read the FAQ for frequent questions and troubleshooting before requesting support or filing a bug.
  
  Community Support is available here. If you are certain you found a bug please file an issue.
